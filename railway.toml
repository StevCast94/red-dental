# Servicios
[build]
  builder = "nixpacks"
  buildCommand = "cd backend && npm install && npx prisma generate && npx tsc && cd ../frontend && npm install && npm run build"
  watchPatterns = ["backend/**", "frontend/**"]

[deploy]
  startCommand = "cd backend && npx prisma db push && node dist/server.js"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "on-failure"
